<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>QR URL Generator</title>

<style>
body{
    font-family: Arial, sans-serif;
    padding:40px;
}
input{
    padding:8px;
    margin:5px;
}
button{
    padding:10px 18px;
    cursor:pointer;
}
.colorRow{
    display:flex;
    align-items:center;
    gap:10px;
}
</style>
</head>

<body>

<h2>QR URL Generator</h2>

<div>
<label>Destination URL</label><br>
<input type="text" id="urlInput" size="50" placeholder="https://example.com">
</div>

<br>

<h3>QR Color</h3>

<div class="colorRow">
<label>Color Picker</label>
<input type="color" id="colorPicker" value="#005992">
</div>

<br>

<label>HEX</label>
<input type="text" id="hexInput" value="#005992">

<br><br>

<label>RGB</label>
<input type="number" id="r" min="0" max="255">
<input type="number" id="g" min="0" max="255">
<input type="number" id="b" min="0" max="255">

<br><br>

<button onclick="buildURL()">Generate QR</button>

<script>

function componentToHex(c){
    const hex = Number(c).toString(16);
    return hex.length === 1 ? "0" + hex : hex;
}

function hexToRgb(hex){

    hex = hex.replace("#","");

    const r = parseInt(hex.substring(0,2),16);
    const g = parseInt(hex.substring(2,4),16);
    const b = parseInt(hex.substring(4,6),16);

    document.getElementById("r").value = r;
    document.getElementById("g").value = g;
    document.getElementById("b").value = b;
}

function rgbToHex(r,g,b){
    return "#" + componentToHex(r) + componentToHex(g) + componentToHex(b);
}

/* Color picker updates HEX and RGB */
document.getElementById("colorPicker").addEventListener("input",function(){

    const hex = this.value;

    document.getElementById("hexInput").value = hex;

    hexToRgb(hex);
});

/* HEX input updates RGB + picker */
document.getElementById("hexInput").addEventListener("input",function(){

    const hex = this.value;

    document.getElementById("colorPicker").value = hex;

    hexToRgb(hex);
});

function buildURL(){

    const url = document.getElementById("urlInput").value.trim();

    if(!url){
        alert("Please enter a URL");
        return;
    }

    let hex = document.getElementById("hexInput").value.replace("#","");

    const finalURL = "https://qr.zat.is/png5." + hex + "~" + url;

    window.location.href = finalURL;
}

/* Initialize RGB fields on load */
hexToRgb("#005992");

</script>

</body>
</html>
