<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>National Weather</title>
  <style>
    :root {
      --sky: #eaf4ff;
      --navy: #0f2a3a;
      --navy2: #123447;
      --teal: #1f6f8b;
      --teal2: #165a70;
      --sun: #ffd36a;
      --ink: #0c2230;
      --muted: #486477;
      --border: rgba(15, 42, 58, 0.14);
      --shadow: 0 14px 34px rgba(15, 42, 58, 0.14);
      --radius: 20px;
      --radius2: 26px;
      --focus: rgba(31, 111, 139, 0.25);
      --ok: #027a48;
    }
    * {
      box-sizing: border-box;
    }
    html, body {
      height: 100%;
    }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      color: var(--ink);
      background: radial-gradient(1200px 700px at 18% 0%,
          rgba(255, 211, 106, 0.45),
          transparent 60%),
        radial-gradient(1000px 600px at 85% 8%,
          rgba(31, 111, 139, 0.2),
          transparent 55%),
        linear-gradient(180deg, var(--sky), #f7fbff 55%, #ffffff 100%);
    }
    a {
      color: var(--teal);
      text-decoration: none;
    }
    a:hover {
      text-decoration: underline;
    }
    .wrap {
      /* max-width: 1120px; */
      margin: 0 auto;
      padding: 20px;
    }
    /* Header */
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 14px;
      flex-wrap: wrap;
      padding: 8px 0 6px;
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      text-decoration: none;
    }
    .logo {
      width: 48px;
      height: 48px;
      border-radius: 14px;
      background: linear-gradient(135deg,
          rgba(255, 255, 255, 0.95),
          rgba(255, 255, 255, 0.7));
      border: 1px solid var(--border);
      box-shadow: 0 12px 26px rgba(15, 42, 58, 0.1);
      position: relative;
      overflow: hidden;
    }
    .logo:before {
      content: "";
      position: absolute;
      left: 10px;
      top: 15px;
      width: 26px;
      height: 16px;
      border-radius: 14px;
      background: #fff;
      box-shadow: 10px 3px 0 -2px #fff, 6px -6px 0 -2px #fff;
      border: 1px solid rgba(15, 42, 58, 0.1);
    }
    .logo:after {
      content: "";
      position: absolute;
      right: 8px;
      top: 8px;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: var(--sun);
      box-shadow: 0 0 0 6px rgba(255, 211, 106, 0.22);
    }
    .brand h1 {
      margin: 0;
      font-size: 18px;
      line-height: 1.1;
      color: var(--navy);
      letter-spacing: 0.2px;
    }
    .brand p {
      margin: 2px 0 0;
      font-size: 13px;
      color: var(--muted);
    }
    nav {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    nav a {
      padding: 8px 10px;
      border-radius: 999px;
      font-weight: 800;
      font-size: 14px;
      color: var(--navy);
      border: 1px solid transparent;
    }
    nav a:hover {
      background: rgba(31, 111, 139, 0.08);
      border-color: rgba(31, 111, 139, 0.18);
      text-decoration: none;
    }
    /* Trust banner */
    .trustbar {
      margin-top: 10px;
      border-radius: 18px;
      padding: 14px 14px;
      background: linear-gradient(135deg,
          rgba(15, 42, 58, 0.96),
          rgba(18, 52, 71, 0.93));
      color: rgba(255, 255, 255, 0.92);
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 16px 34px rgba(15, 42, 58, 0.16);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }
    .trustbar strong {
      color: #fff;
    }
    .trustbadges {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.14);
      color: rgba(255, 255, 255, 0.92);
      font-weight: 750;
      font-size: 12px;
      white-space: nowrap;
    }
    .badge .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--sun);
      box-shadow: 0 0 0 4px rgba(255, 211, 106, 0.16);
    }
    /* Layout cards */
    .card {
      background: rgba(255, 255, 255, 0.9);
      border: 1px solid var(--border);
      border-radius: var(--radius2);
      box-shadow: var(--shadow);
      overflow: hidden;
    }
    .hero {
      display: grid;
      grid-template-columns: 1.1fr 0.9fr;
      gap: 22px;
      align-items: stretch;
      padding: 16px 0 10px;
    }
    @media (max-width: 900px) {
      .hero {
        grid-template-columns: 1fr;
      }
    }
    /* Left content */
    .kicker {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(31, 111, 139, 0.08);
      border: 1px solid rgba(31, 111, 139, 0.16);
      color: var(--navy);
      font-weight: 800;
      font-size: 13px;
    }
    .kicker .mini {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--teal);
      box-shadow: 0 0 0 4px rgba(31, 111, 139, 0.18);
    }
    .hero h2 {
      margin: 14px 0 10px;
      font-size: 34px;
      line-height: 1.12;
      letter-spacing: -0.2px;
      color: var(--navy);
    }
    .lead {
      margin: 0;
      color: var(--muted);
      font-size: 16px;
      line-height: 1.65;
      max-width: 62ch;
    }
    .pill-row {
      margin-top: 14px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }
    .pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      border-radius: 999px;
      background: rgba(15, 42, 58, 0.04);
      border: 1px solid rgba(15, 42, 58, 0.12);
      color: var(--navy2);
      font-weight: 750;
      font-size: 13px;
      white-space: nowrap;
    }
    .pill .mini {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: var(--teal);
      box-shadow: 0 0 0 4px rgba(31, 111, 139, 0.14);
    }
    .trustbox {
      margin-top: 16px;
      padding: 14px;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.72);
      border: 1px solid rgba(15, 42, 58, 0.14);
    }
    .trustbox h3 {
      margin: 0 0 8px;
      font-size: 16px;
      color: var(--navy);
    }
    .trustbox ul {
      margin: 0;
      padding-left: 18px;
      color: var(--muted);
      line-height: 1.65;
      font-size: 14px;
    }
    .trustbox li {
      margin: 6px 0;
    }
    .steps {
      margin-top: 14px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    @media (max-width: 620px) {
      .steps {
        grid-template-columns: 1fr;
      }
    }
    .step {
      border-radius: 18px;
      border: 1px solid rgba(15, 42, 58, 0.12);
      background: rgba(31, 111, 139, 0.05);
      padding: 12px;
    }
    .step strong {
      display: block;
      margin-bottom: 4px;
      color: var(--navy);
    }
    .step span {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.55;
    }
    .notice {
      margin-top: 10px;
      font-size: 12px;
      color: var(--muted);
      line-height: 1.5;
    }
    .grid2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    @media (max-width: 520px) {
      .grid2 {
        grid-template-columns: 1fr;
      }
    }
    label {
      font-size: 13px;
      font-weight: 850;
      color: var(--navy);
    }
    .field {
      display: grid;
      gap: 6px;
    }
    input, select, textarea {
      width: 100%;
      padding: 12px 12px;
      border-radius: 14px;
      border: 1px solid rgba(15, 42, 58, 0.18);
      background: rgba(255, 255, 255, 0.96);
      color: var(--ink);
      font-size: 15px;
      outline: none;
    }
    textarea {
      min-height: 92px;
      resize: vertical;
    }
    input:focus, select:focus, textarea:focus {
      box-shadow: 0 0 0 5px var(--focus);
      border-color: rgba(31, 111, 139, 0.35);
    }
    .help {
      font-size: 12px;
      color: var(--muted);
      line-height: 1.45;
    }
    .consentbox {
      display: grid;
      gap: 10px;
      padding: 12px;
      border-radius: 16px;
      background: rgba(15, 42, 58, 0.03);
      border: 1px solid rgba(15, 42, 58, 0.12);
    }
    .checkrow {
      display: flex;
      gap: 10px;
      align-items: flex-start;
      padding: 10px 10px;
      border-radius: 14px;
      background: rgba(47, 122, 90, 0.06);
      border: 1px solid rgba(47, 122, 90, 0.18);
    }
    .checkrow input {
      width: 18px;
      height: 18px;
      margin-top: 2px;
    }
    .checkrow .help {
      margin: 0;
    }
    .checkrow.marketing {
      background: rgba(255, 211, 106, 0.18);
      border-color: rgba(255, 211, 106, 0.35);
    }
    .btnrow {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }
    button {
      appearance: none;
      border: none;
      cursor: pointer;
      padding: 12px 14px;
      border-radius: 14px;
      font-weight: 900;
      font-size: 15px;
    }
    .btn-primary {
      background: linear-gradient(180deg, var(--navy), var(--teal2));
      color: #fff;
      box-shadow: 0 12px 20px rgba(15, 42, 58, 0.22);
    }
    .btn-primary:hover {
      filter: brightness(1.04);
    }
    .btn-secondary {
      background: rgba(255, 255, 255, 0.92);
      border: 1px solid rgba(15, 42, 58, 0.18);
      color: var(--navy);
    }
    .btn-secondary:hover {
      background: #fff;
    }
    .receipt {
      margin-top: 12px;
      padding: 12px;
      border-radius: 16px;
      border: 1px solid rgba(2, 122, 72, 0.2);
      background: rgba(2, 122, 72, 0.05);
      display: none;
    }
    .receipt strong {
      color: var(--ok);
    }
    .receipt pre {
      margin: 10px 0 0;
      padding: 10px;
      border-radius: 12px;
      border: 1px solid rgba(15, 42, 58, 0.12);
      background: rgba(255, 255, 255, 0.7);
      overflow: auto;
      max-height: 260px;
      font-size: 12px;
      color: var(--navy);
    }
    .receipt .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 10px;
    }
    .mini-btn {
      padding: 9px 10px;
      border-radius: 12px;
      border: 1px solid rgba(15, 42, 58, 0.18);
      background: rgba(255, 255, 255, 0.92);
      color: var(--navy);
      font-weight: 900;
      font-size: 13px;
      cursor: pointer;
    }
    .mini-btn:hover {
      background: #fff;
    }
    /* Radar + Severity */
    .radar-tag {
      background: linear-gradient(135deg, var(--navy), var(--teal2));
      color: #fff;
      padding: 6px 12px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 900;
      box-shadow: 0 6px 12px rgba(15, 42, 58, 0.2);
      white-space: nowrap;
    }
    .severity-wrap {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      margin-top: 14px;
    }
    @media (max-width: 900px) {
      .severity-wrap {
        grid-template-columns: 1fr;
      }
    }
    .severity-card {
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 14px;
      background: rgba(15, 42, 58, 0.02);
    }
    .sev-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      flex-wrap: wrap;
    }
    .sev-chip {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: #fff;
      font-weight: 950;
      font-size: 12px;
      color: var(--navy);
    }
    .sev-dot {
      width: 10px;
      height: 10px;
      border-radius: 999px;
      background: #9aa9b2;
      box-shadow: 0 0 0 4px rgba(15, 42, 58, 0.08);
    }
    .sev-title {
      font-weight: 950;
      color: var(--navy);
      margin: 0;
    }
    .sev-sub {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
    }
    .alert-list {
      margin: 10px 0 0;
      padding-left: 18px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.55;
    }
    .small-row {
      margin-top: 10px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }
    .small-btn {
      padding: 10px 12px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: #fff;
      color: var(--navy);
      font-weight: 950;
      font-size: 13px;
      cursor: pointer;
    }
    .small-btn:hover {
      background: rgba(31, 111, 139, 0.06);
    }
    .mini-note {
      font-size: 12px;
      color: var(--muted);
      line-height: 1.45;
    }
    iframe {
      border: 0;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <!-- TRUST BANNER (restored + strengthened) -->
    <!-- HOME -->
    <main id="home" class="page active">
      <!-- RADAR + STORM SEVERITY (Windy + NWS Alerts) -->
      <section class="card" style="margin-top:18px;">
        <div style="padding:20px;">
          <div style="display:flex; justify-content:space-between; align-items:flex-end; flex-wrap:wrap; gap:12px;">
            <div>
              <h3 style="margin:0 0 6px; font-size:20px; color:var(--navy);">Live National Weather Radar</h3>
              <p style="margin:0; color:var(--muted); font-size:14px; line-height:1.6; max-width:62ch;">
                Monitor real-time precipitation and storm movement across the United States. Use zoom and pan to view your local area.
              </p>
            </div>
            <!-- <div class="radar-tag">LIVE RADAR</div> -->
          </div>
          <div style="
            position:relative;
            width:100%;
            padding-bottom:60%;
            margin-top:16px;
            border-radius:22px;
            overflow:hidden;
            border:1px solid var(--border);
            box-shadow:0 14px 28px rgba(15,42,58,.15);
            background:#0f2a3a;
          ">
            <iframe title="Live National Weather Radar" src="https://embed.windy.com/embed2.html?type=map&location=coordinates&overlay=radar&level=surface&product=ecmwf&lat=39.50&lon=-98.35&zoom=4&message=true" style="position:absolute; top:0; left:0; width:100%; height:100%; border:0;" loading="lazy" referrerpolicy="no-referrer-when-downgrade" allowfullscreen>
            </iframe>
          </div>
          <p style="margin:12px 0 0; font-size:12px; color:var(--muted);">
            Radar powered by Windy. Severity uses public National Weather Service alerts when available.
          </p>
        </div>
      </section>
    </main>
  </div>
</body>
</html>
